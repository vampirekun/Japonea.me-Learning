<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ff4f87" />
    <title>Japonea.me Learning</title>
    <link rel="icon" type="image/png" href="./assets/cropped-japoneame-1.png" />
    <link rel="apple-touch-icon" href="./assets/cropped-japoneame-1.png" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="splashScreen" class="splash-screen" aria-hidden="true">
      <img src="./assets/cropped-japoneame-1.png" alt="Japonea.me" class="splash-logo" width="180" height="60" />
    </div>

    <main class="app">
      <header class="app-header">
        <img class="brand-logo" src="./assets/cropped-japoneame-1.png" alt="Logo de Japonea.me" width="160" height="48" />
        <div class="brand-copy">
          <h1 class="brand-title">Japonea.me Learning</h1>
          <p class="brand-subtitle">Aprende japonés con tarjetas y quiz rápido</p>
        </div>
      </header>

      <section class="controls">
        <label>
          Lote
          <select id="batchSelect" aria-label="Seleccionar lote"></select>
        </label>
        <label>
          Categoría
          <select id="categorySelect" aria-label="Seleccionar categoría"></select>
        </label>
        <label class="toggle-row" for="hideKnownToggle">
          <span>Ocultar conocidas</span>
          <input id="hideKnownToggle" type="checkbox" />
        </label>
        <label class="toggle-row" for="shuffleToggle">
          <span>Mezclar tarjetas</span>
          <input id="shuffleToggle" type="checkbox" />
        </label>
      </section>

      <section class="progress-shell" aria-label="Progreso del lote">
        <div class="progress-track">
          <span id="progressFill" class="progress-fill"></span>
        </div>
        <p id="progressLabel" class="progress-label">Progreso: 0%</p>
      </section>

      <section class="focus-stage" aria-label="Zona principal de estudio">
        <section class="card-section">
          <div id="card" class="card" role="button" tabindex="0" aria-label="Tarjeta (toca para girar)">
            <div class="card-inner">
              <article class="card-face card-front">
                <p class="badge" id="cardType"></p>
                <h2 id="cardRomajiFront"></h2>
                <p id="cardKana"></p>
                <p id="cardKanji"></p>
              </article>
              <article class="card-face card-back">
                <h2 id="cardSpanish"></h2>
                <p id="cardRomaji"></p>
              </article>
            </div>
          </div>
        </section>

        <section class="quiz">
          <p class="quiz-title">Quiz rápido</p>
          <div id="quizOptions" class="quiz-options"></div>
          <button id="quizNextBtn" class="quiz-next" type="button" hidden>Siguiente</button>
        </section>
      </section>

      <section class="meta">
        <span id="cardCounter">0 / 0</span>
        <span id="seenCounter">Vistas: 0</span>
        <span id="knownCounter">Conocidas: 0</span>
        <span id="quizStats" class="quiz-stats" aria-live="polite">✅ 0 · ❌ 0 · Precisión: 0%</span>
      </section>

      <section class="actions">
        <button id="prevBtn" type="button">← Anterior</button>
        <button id="knownBtn" type="button">Marcar conocida</button>
        <button id="nextBtn" type="button">Siguiente →</button>
      </section>
    </main>

    <section id="quizResultScreen" class="quiz-result-screen" hidden aria-live="polite">
      <article class="quiz-result-card">
        <p id="quizResultState" class="quiz-result-state"></p>
        <h2 id="quizResultTitle" class="quiz-result-title"></h2>
        <div class="quiz-result-metrics">
          <p>Total: <strong id="quizResultTotal">0</strong></p>
          <p>Correctas: <strong id="quizResultCorrect">0</strong></p>
          <p>Incorrectas: <strong id="quizResultIncorrect">0</strong></p>
          <p>Precisión: <strong id="quizResultAccuracy">0%</strong></p>
        </div>
        <div class="quiz-result-actions">
          <button id="retryQuizBtn" type="button">Reintentar quiz</button>
          <button id="goHomeBtn" type="button">Volver al inicio</button>
        </div>
      </article>
    </section>

    <script type="module" src="./app.js"></script>
  </body>
</html>
