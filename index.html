<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#e4007c" />
    <title>Japonea.me Learning</title>
    <link rel="icon" type="image/png" href="./assets/cropped-japoneame-1.png" />
    <link rel="apple-touch-icon" href="./assets/cropped-japoneame-1.png" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="splashScreen" class="splash-screen" aria-hidden="true">
      <img src="./assets/cropped-japoneame-1.png" alt="Japonea.me" class="splash-logo" width="180" height="60" />
    </div>

    <div id="drawerOverlay" class="drawer-overlay"></div>

    <aside id="drawerMenu" class="drawer" aria-label="Menú de opciones">
      <div class="drawer-header">
        <span class="drawer-title">Opciones</span>
        <button id="closeDrawerBtn" class="drawer-close" type="button" aria-label="Cerrar menú">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <line x1="2" y1="2" x2="16" y2="16" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
            <line x1="16" y1="2" x2="2" y2="16" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="drawer-body">
        <section class="settings-group" aria-label="Modo">
          <h3 class="settings-group-title">Modo</h3>
          <label>
            Selector
            <select id="modeSelect" aria-label="Seleccionar modo">
              <option value="learning">Aprendizaje</option>
              <option value="quiz">Quiz</option>
            </select>
          </label>
        </section>

        <section class="settings-group" aria-label="Contenido">
          <h3 class="settings-group-title">Contenido</h3>
          <label>
            Lote
            <select id="batchSelect" aria-label="Seleccionar lote"></select>
          </label>
          <label>
            Categoría
            <select id="categorySelect" aria-label="Seleccionar categoría"></select>
          </label>
        </section>

        <section class="settings-group" aria-label="Opciones">
          <h3 class="settings-group-title">Opciones</h3>
          <label class="switch-row" for="hideKnownToggle">
            <span>Ocultar conocidas</span>
            <span class="switch">
              <input id="hideKnownToggle" type="checkbox" />
              <span class="switch-slider" aria-hidden="true"></span>
            </span>
          </label>
          <label class="switch-row" for="shuffleToggle">
            <span>Mezclar tarjetas</span>
            <span class="switch">
              <input id="shuffleToggle" type="checkbox" />
              <span class="switch-slider" aria-hidden="true"></span>
            </span>
          </label>
        </section>

        <section class="settings-group" aria-label="Audio">
          <h3 class="settings-group-title">Audio</h3>
          <label>
            Velocidad
            <select id="audioSpeedSelect" aria-label="Seleccionar velocidad de audio">
              <option value="0.75">0.75x</option>
              <option value="1">1x</option>
              <option value="1.25">1.25x</option>
              <option value="1.5">1.5x</option>
            </select>
          </label>
          <button id="audioTutorBtn" type="button">Iniciar modo tutor de audio</button>
        </section>
      </div>
    </aside>

    <main class="app">
      <header class="app-header">
        <button id="hamburgerBtn" class="hamburger-btn" type="button" aria-label="Abrir menú de opciones" aria-expanded="false" aria-controls="drawerMenu">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
            <rect y="3.5" width="22" height="2.4" rx="1.2" fill="currentColor"/>
            <rect y="9.8" width="22" height="2.4" rx="1.2" fill="currentColor"/>
            <rect y="16.1" width="22" height="2.4" rx="1.2" fill="currentColor"/>
          </svg>
        </button>
        <img class="brand-logo" src="./assets/cropped-japoneame-1.png" alt="Logo de Japonea.me" width="640" height="192" />
        <p id="modeBadge" class="mode-badge" aria-live="polite">🎓 Modo Aprendizaje</p>
      </header>

      <section class="progress-shell" aria-label="Progreso del lote">
        <div class="progress-track">
          <span id="progressFill" class="progress-fill"></span>
        </div>
        <div class="progress-meta">
          <p id="progressLabel" class="progress-label">Progreso: 0%</p>
          <p id="progressCounter" class="progress-counter">0 / 0</p>
        </div>
      </section>

      <section class="focus-stage" aria-label="Zona principal de estudio">
        <section class="card-section">
          <div id="card" class="card" role="button" tabindex="0" aria-label="Tarjeta (toca para girar)">
            <div class="card-inner">
              <article class="card-face card-front">
                <p class="badge" id="cardType"></p>
                <h2 id="cardRomajiFront"></h2>
                <p id="cardKana"></p>
                <p id="cardKanji"></p>
                <div id="cardExampleBlockFront" class="card-example-block" hidden>
                  <p id="cardExampleJpFront" class="card-example-jp"></p>
                  <p id="cardExampleEsFront" class="card-example-es"></p>
                </div>
              </article>
              <article class="card-face card-back">
                <h2 id="cardSpanish"></h2>
                <p id="cardRomaji"></p>
                <div id="cardExampleBlockBack" class="card-example-block" hidden>
                  <p id="cardExampleJpBack" class="card-example-jp"></p>
                  <p id="cardExampleEsBack" class="card-example-es"></p>
                </div>
              </article>
            </div>
            <button id="cardAudioBtn" class="card-audio-btn" type="button" aria-label="Reproducir pronunciación en japonés">🔊</button>
          </div>
        </section>

        <section class="quiz">
          <p class="quiz-title">Quiz rápido</p>
          <div id="quizOptions" class="quiz-options"></div>
          <button id="quizNextBtn" class="quiz-next" type="button" hidden>Siguiente</button>
        </section>
      </section>

      <section class="meta">
        <span id="cardCounter">0 / 0</span>
        <span id="seenCounter">Vistas: 0</span>
        <span id="knownCounter">Conocidas: 0</span>
        <span id="quizStats" class="quiz-stats" aria-live="polite">✅ 0 · ❌ 0 · Precisión: 0%</span>
      </section>

      <section class="actions">
        <button id="prevBtn" type="button">← Anterior</button>
        <button id="knownBtn" type="button">Marcar conocida</button>
        <button id="nextBtn" type="button">Siguiente →</button>
      </section>

      <section id="audioTutorPanel" class="audio-tutor-panel" hidden aria-live="polite">
        <p id="audioTutorStatus" class="audio-tutor-status">Tutor de audio listo</p>
        <p id="audioTutorProgress" class="audio-tutor-progress">0 / 0</p>
        <div class="audio-tutor-controls">
          <button id="audioTutorPlayPauseBtn" type="button">Pausar</button>
          <button id="audioTutorPrevBtn" type="button">←</button>
          <button id="audioTutorNextBtn" type="button">→</button>
          <button id="audioTutorExitBtn" type="button">Salir</button>
        </div>
      </section>

      <footer class="app-footer">Alejandro Mellado © 2026</footer>
    </main>

    <section id="repeatPromptOverlay" class="repeat-prompt-overlay" hidden aria-live="polite" aria-label="Repite en voz alta">
      <div class="repeat-prompt-content">
        <p class="repeat-prompt-icon" aria-hidden="true">🎤</p>
        <p class="repeat-prompt-text">Repite en voz alta</p>
      </div>
    </section>

    <section id="quizResultScreen" class="quiz-result-screen" hidden aria-live="polite">
      <article class="quiz-result-card">
        <p id="quizResultState" class="quiz-result-state"></p>
        <h2 id="quizResultTitle" class="quiz-result-title"></h2>
        <div class="quiz-result-metrics">
          <p>Total: <strong id="quizResultTotal">0</strong></p>
          <p>Correctas: <strong id="quizResultCorrect">0</strong></p>
          <p>Incorrectas: <strong id="quizResultIncorrect">0</strong></p>
          <p>Precisión: <strong id="quizResultAccuracy">0%</strong></p>
        </div>
        <div class="quiz-result-actions">
          <button id="retryQuizBtn" type="button">Reintentar quiz</button>
          <button id="goHomeBtn" type="button">Volver al inicio</button>
        </div>
      </article>
    </section>

    <script type="module" src="./app.js"></script>
  </body>
</html>
